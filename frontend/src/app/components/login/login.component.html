<section class="login-shell">
  <div class="login-copy">
    <p class="eyebrow">Inventory intelligence</p>
    <h1>Keep every sale and every shelf in sync.</h1>
    <p>One operational view for product management, checkout, stock control, and sales reporting.</p>
  </div>

  <form class="panel login-card" [formGroup]="form" (ngSubmit)="submit()">
    <h2>Welcome back</h2>
    <p class="muted">Sign in to your store workspace.</p>
    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email">
    </label>
    <label>
      Password
      <input type="password" formControlName="password" autocomplete="current-password">
    </label>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <button class="button primary wide" [disabled]="form.invalid || loading">
      {{ loading ? 'Signing in...' : 'Sign in' }}
    </button>
    <p class="hint">Default admin: admin&#64;retail.local / ChangeMe123!</p>
  </form>
</section>
