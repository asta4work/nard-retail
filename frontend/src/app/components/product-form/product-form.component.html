<section class="page narrow">
  <a class="back" routerLink="/products">&larr; Back to products</a>

  <form class="panel form-card" [formGroup]="form" (ngSubmit)="save()">
    <div>
      <p class="eyebrow">Catalog management</p>
      <h1>{{ id ? 'Edit product' : 'Add product' }}</h1>
    </div>

    <div class="form-grid">
      <label class="full">
        Product name
        <input formControlName="name" placeholder="e.g. Ceramic coffee dripper">
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <small class="error">Name is required.</small>
        }
      </label>
      <label>
        Category
        <input formControlName="category" placeholder="e.g. Kitchen">
      </label>
      <label>
        Price
        <input type="number" min="0.01" step="0.01" formControlName="price">
      </label>
      <label>
        Stock quantity
        <input type="number" min="0" step="1" formControlName="stockQuantity">
      </label>
      <label class="full">
        Product icon
        <div class="icon-picker">
          @for (option of iconOptions; track option.value) {
            <label [class.selected]="form.controls.icon.value === option.value">
              <input type="radio" formControlName="icon" [value]="option.value">
              <svg [lucideIcon]="option.value" aria-hidden="true"></svg>
              <span>{{ option.label }}</span>
            </label>
          }
        </div>
      </label>
      <label class="full">
        Description
        <textarea rows="5" formControlName="description" placeholder="Product details"></textarea>
      </label>
    </div>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <div class="actions">
      <button class="button primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Saving...' : 'Save product' }}
      </button>
      <a class="button ghost" routerLink="/products">Cancel</a>
    </div>
  </form>
</section>
